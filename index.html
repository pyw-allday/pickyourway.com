<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pick your way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #FAF9F6; margin: 0; }
        .aspect-19-5 { aspect-ratio: 19.5 / 5; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const wallpapers = [
            { id: 1, src: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=2400&q=100", thumb: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80", title: "Silent Ridge", category: "Nature" },
            { id: 2, src: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=2400&q=100", thumb: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1200&q=80", title: "Frozen Light", category: "Nature" },
            { id: 3, src: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=2400&q=100", thumb: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80", title: "Concrete Form", category: "Minimal" }
        ];

        function App() {
            const [selected, setSelected] = useState(null);
            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full h-[62px] px-8 flex items-center justify-between z-40 bg-[#FAF9F6]/80 backdrop-blur-md">
                        <span className="font-bold text-sm">pick your way</span>
                    </nav>
                    <section className="h-[80vh] relative flex flex-col justify-end p-8 md:p-14 overflow-hidden">
                        <img src={wallpapers[0].src} className="absolute inset-0 w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-black/30" />
                        <h1 className="relative text-white text-3xl font-medium">These are the backgrounds of PYW.</h1>
                    </section>
                    <div className="p-6 md:p-14 flex flex-col gap-6">
                        {wallpapers.map(item => (
                            <div key={item.id} className="aspect-19-5 overflow-hidden cursor-pointer group" onClick={() => setSelected(item)}>
                                <img src={item.thumb} className="w-full h-full object-cover transition-transform group-hover:scale-105" />
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
