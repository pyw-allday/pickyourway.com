<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pick your way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #FAF9F6; margin: 0; }
        .aspect-19-5 { aspect-ratio: 19.5 / 5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const wallpapers = [
            { id: 1, src: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=3840&q=100", thumb: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80", title: "Silent Ridge", category: "Nature", resolution: "3840 x 2160" },
            { id: 2, src: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=3840&q=100", thumb: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1200&q=80", title: "Frozen Light", category: "Nature", resolution: "3840 x 2160" },
            { id: 3, src: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=3840&q=100", thumb: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=80", title: "Concrete Form", category: "Minimal", resolution: "3840 x 2160" },
            { id: 4, src: "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=3840&q=100", thumb: "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1200&q=80", title: "Morning Object", category: "Object", resolution: "3840 x 2160" },
            { id: 5, src: "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=3840&q=100", thumb: "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=80", title: "Aerial Green", category: "Nature", resolution: "3840 x 2160" }
        ];

        function App() {
            const [selectedItem, setSelectedItem] = useState(null);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 40);
                window.addEventListener("scroll", onScroll);
                return () => window.removeEventListener("scroll", onScroll);
            }, []);

            return (
                <div className="min-h-screen">
                    {/* NAVBAR */}
                    <nav className={`fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-8 md:px-14 h-[62px] transition-all duration-400 ${scrolled ? 'bg-[#FAF9F6]/90 backdrop-blur-md border-b border-black/5' : 'bg-transparent'}`}>
                        <span className="text-sm font-semibold text-[#222]">pick your way</span>
                        <span className="text-xs font-medium text-[#888] cursor-pointer hover:text-[#222]">Archive</span>
                    </nav>

                    {/* HERO */}
                    <section className="relative w-full h-screen min-h-[520px] flex flex-col justify-end overflow-hidden">
                        <motion.img 
                            src={wallpapers[0].src} 
                            className="absolute inset-0 w-full h-full object-cover"
                            initial={{ scale: 1.1, opacity: 0 }}
                            animate={{ scale: 1, opacity: 1 }}
                            transition={{ duration: 1.5 }}
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent" />
                        <div className="relative z-10 px-8 md:px-14 pb-20">
                            <p className="text-[10px] uppercase text-white/50 tracking-[0.2em] mb-4">pick your way</p>
                            <h1 className="text-white text-2xl md:text-4xl font-medium leading-tight max-w-xl">
                                These are the backgrounds of PYW's various moments. <br/>
                                <span className="text-white/60">I hope you're happier.</span>
                            </h1>
                        </div>
                    </section>

                    {/* GALLERY */}
                    <section className="px-6 md:px-14 py-20">
                        <div className="flex justify-between items-end mb-12">
                            <div>
                                <p className="text-[10px] uppercase text-[#bbb] tracking-widest mb-2">Wallpapers</p>
                                <h2 className="text-2xl font-medium text-[#1a1a1a]">All Works</h2>
                            </div>
                        </div>
                        <div className="flex flex-col gap-4">
                            {wallpapers.map((item) => (
                                <div 
                                    key={item.id} 
                                    className="relative aspect-19-5 overflow-hidden cursor-pointer group"
                                    onClick={() => setSelectedItem(item)}
                                >
                                    <img src={item.thumb} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                    <div className="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-colors duration-500 flex items-end p-6">
                                        <div className="opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                                            <p className="text-[10px] text-white/60 uppercase">{item.category}</p>
                                            <h3 className="text-white font-medium">{item.title}</h3>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* MODAL */}
                    <AnimatePresence>
                        {selectedItem && (
                            <motion.div 
                                className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm"
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                onClick={() => setSelectedItem(null)}
                            >
                                <motion.div 
                                    className="bg-[#FAF9F6] w-full max-w-5xl overflow-hidden"
                                    initial={{ y: 50, opacity: 0 }} animate={{ y: 0, opacity: 1 }}
                                    onClick={e => e.stopPropagation()}
                                >
                                    <div className="aspect-19-5 w-full">
                                        <img src={selectedItem.src} className="w-full h-full object-cover" />
                                    </div>
                                    <div className="p-6 flex justify-between items-center">
                                        <div>
                                            <p className="text-[10px] text-[#999] uppercase">{selectedItem.category}</p>
                                            <h3 className="text-lg font-medium">{selectedItem.title}</h3>
                                        </div>
                                        <button 
                                            className="bg-[#222] text-white px-6 py-2 text-sm hover:bg-black transition-colors"
                                            onClick={() => window.open(selectedItem.src)}
                                        >
                                            Download
                                        </button>
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
