<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pick your way</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #FAF9F6;
            margin: 0;
        }

        .aspect-phone {
            aspect-ratio: 9 / 19.5;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const categories = ["all", "photo", "calendar"];

        const wallpapers = [
    {
        id: 1,
        src: "./images/may.jpg",
        thumb: "./images/may.jpg",
        title: "May",
        category: "photo"
    },
    {
        id: 2,
        src: "./images/may1.jpeg",
        thumb: "./images/may1.jpeg",
        title: "May Calendar 01",
        category: "calendar"
    },
    {
        id: 3,
        src: "./images/may2.jpeg",
        thumb: "./images/may2.jpeg",
        title: "May Calendar 02",
        category: "calendar"
    },
    {
        id: 4,
        src: "./images/june.jpeg",
        thumb: "./images/june.jpeg",
        title: "June",
        category: "photo"
    },
    {
        id: 5,
        src: "./images/june1.jpg",
        thumb: "./images/june1.jpg",
        title: "June Calendar Eng",
        category: "calendar"
    },
    {
        id: 6,
        src: "./images/june2.jpg",
        thumb: "./images/june2.jpg",
        title: "June Calendar Kor",
        category: "calendar"
    },
            {
    id: 7,
    src: "./images/july1.jpg",
    thumb: "./images/july1.jpg",
    title: "July 01",
    category: "photo"
},
{
    id: 8,
    src: "./images/july2.jpg",
    thumb: "./images/july2.jpg",
    title: "July 02",
    category: "photo"
},
{
    id: 9,
    src: "./images/july3.jpg",
    thumb: "./images/july3.jpg",
    title: "July 03",
    category: "photo"
},
{
    id: 10,
    src: "./images/july4.jpg",
    thumb: "./images/july4.jpg",
    title: "July 04",
    category: "photo"
},
            {
  title: "july1.1",
  category: "calendar",
  image: "/photo/july1.1.jpg",
},
{
  title: "july2.1",
  category: "calendar",
  image: "/photo/july2.1.jpg",
},
{
  title: "july3.1",
  category: "calendar",
  image: "/photo/july3.1.jpg",
},
{
  title: "july4.1",
  category: "calendar",
  image: "/photo/july4.1.jpg",
},
];
        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [activeCategory, setActiveCategory] = useState("all");

            useEffect(() => {
                const onScroll = () => {
                    setScrolled(window.scrollY > 40);
                };

                window.addEventListener("scroll", onScroll);

                return () => {
                    window.removeEventListener("scroll", onScroll);
                };
            }, []);

            const filteredWallpapers = activeCategory === "all"
                ? wallpapers
                : wallpapers.filter((item) => item.category === activeCategory);

            const handleDownload = async (item) => {
                try {
                    const response = await fetch(item.src);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);

                    const link = document.createElement("a");
                    link.href = url;
                    link.download = `${item.title}.jpg`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    window.URL.revokeObjectURL(url);
                } catch (error) {
                    window.open(item.src, "_blank");
                }
            };

            return (
                <div className="min-h-screen">
                    <nav className={`fixed top-0 w-full h-[62px] px-6 md:px-8 flex items-center justify-between z-40 transition-all duration-300 ${
                        scrolled
                            ? "bg-[#FAF9F6]/90 backdrop-blur-md border-b border-black/10 text-black"
                            : "bg-transparent text-white"
                    }`}>
                        <span className="font-bold text-sm">pick your way</span>

                        <div className="hidden md:flex items-center gap-5 text-xs">
                            {categories.map((category) => (
                                <button
                                    key={category}
                                    onClick={() => setActiveCategory(category)}
                                    className={`uppercase tracking-wide transition-opacity ${
                                        activeCategory === category ? "opacity-100 font-semibold" : "opacity-50 hover:opacity-100"
                                    }`}
                                >
                                    {category}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <section className="h-screen relative flex flex-col justify-end p-8 md:p-14 overflow-hidden">
                        <img
                            src="./images/home-1.jpg"
                            className="absolute inset-0 w-full h-full object-cover"
                            alt="home background"
                        />

                        <div className="absolute inset-0 bg-black/35"></div>

                        <div className="relative z-10">
                            <p className="text-[10px] uppercase tracking-widest text-white/60 mb-2">
                                pick your way
                            </p>

                            <h1 className="text-white text-2xl md:text-4xl font-medium leading-tight max-w-xl">
                                These are wallpapers of pyw's various moments. <br />
                                <span className="text-white/60">I hope you're happier.</span>
                            </h1>
                        </div>
                    </section>

                    <main className="p-6 md:p-14">
                        <div className="flex md:hidden items-center gap-3 mb-8 overflow-x-auto">
                            {categories.map((category) => (
                                <button
                                    key={category}
                                    onClick={() => setActiveCategory(category)}
                                    className={`px-4 py-2 rounded-full text-xs uppercase tracking-wide border transition-all ${
                                        activeCategory === category
                                            ? "bg-black text-white border-black"
                                            : "bg-transparent text-black/50 border-black/20"
                                    }`}
                                >
                                    {category}
                                </button>
                            ))}
                        </div>

                        <div className="flex items-end justify-between mb-8">
                            <div>
                                <p className="text-[10px] uppercase tracking-widest text-black/40 mb-2">
                                    category
                                </p>
                                <h2 className="text-2xl md:text-4xl font-medium">
                                    {activeCategory}
                                </h2>
                            </div>

                            <p className="text-xs text-black/40">
                                tap to download
                            </p>
                        </div>

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
                            {filteredWallpapers.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => handleDownload(item)}
                                    className="relative aspect-phone overflow-hidden cursor-pointer group bg-black text-left"
                                >
                                    <img
                                        src={item.thumb}
                                        className="w-full h-full object-cover"
                                        alt={item.title}
                                    />

                                    <div className="absolute inset-0 bg-black/0 group-hover:bg-black/45 transition-all duration-300 flex items-end p-4">
                                        <div className="opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                            <p className="text-[9px] text-white/60 uppercase mb-1">
                                                {item.category}
                                            </p>

                                            <h3 className="text-white text-sm font-medium leading-tight">
                                                {item.title}
                                            </h3>
                                        </div>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
